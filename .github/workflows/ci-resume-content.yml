name: CI — Resume content

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resume_content:
    name: Resume content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build frontend docker image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --rm frontend sh -lc "yarn --cwd ../../packages/resume-content install --frozen-lockfile && yarn --cwd ../../packages/resume-content lint"

      - name: Typecheck
        run: docker compose run --rm frontend yarn --cwd ../../packages/resume-content typecheck

      - name: Unit tests
        run: docker compose run --rm frontend yarn --cwd ../../packages/resume-content test:unit
