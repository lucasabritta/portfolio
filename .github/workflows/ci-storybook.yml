name: CI — Storybook

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  storybook:
    name: Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build frontend docker image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --rm frontend sh -lc "yarn --cwd ../../packages/storybook install --frozen-lockfile && yarn --cwd ../../packages/storybook lint"

      - name: Typecheck
        run: docker compose run --rm frontend yarn --cwd ../../packages/storybook typecheck

      - name: Storybook UI tests
        run: docker compose run --rm frontend yarn --cwd ../../packages/storybook test:storybook
