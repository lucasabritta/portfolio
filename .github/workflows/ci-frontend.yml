name: CI — Frontend

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Build frontend docker image
        run: docker compose build frontend

      - name: Install frontend dependencies
        run: docker compose run --rm frontend yarn install

      - name: Lint
        run: docker compose run --rm frontend yarn lint

      - name: Typecheck
        run: docker compose run --rm frontend yarn typecheck

      - name: Unit tests
        run: docker compose run --rm frontend yarn test:unit
