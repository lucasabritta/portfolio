name: CI - E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build frontend test image
        run: docker compose build frontend

      - name: Lint e2e tests
        run: docker compose run --rm frontend yarn lint:e2e

      - name: Run Playwright e2e tests
        run: docker compose run --rm frontend yarn test:e2e
