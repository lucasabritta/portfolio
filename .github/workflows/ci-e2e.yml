name: CI - E2E

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      
      - name: Build frontend docker image
        run: docker compose build frontend

      - name: Lint e2e tests
        run: docker compose run --rm frontend sh -lc "yarn --cwd ../../apps/e2e install --frozen-lockfile && yarn --cwd ../../apps/e2e lint"

      - name: Run Playwright e2e tests
        run: docker compose run --rm frontend yarn --cwd ../../apps/e2e test:e2e
