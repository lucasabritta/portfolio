name: CI — Production build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  production_build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run build
        run: yarn build
        # Includes `yarn workspace @portfolio/storybook build-storybook` (static bundle → `apps/frontend/public/storybook/`) then `next build`.
