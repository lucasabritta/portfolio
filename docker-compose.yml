services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: yarn workspace @portfolio/backend dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_apps_next:/app/apps/frontend/.next
    environment:
      HOST: 0.0.0.0
      PORT: 4000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      - backend
    ports:
      - "3000:3000"
      - "6006:6006"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_apps_next:/app/apps/frontend/.next
    environment:
      BACKEND_ORIGIN: http://backend:4000
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      BACKEND_ORIGIN: http://backend:4000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    profiles:
      - prod

  cv-tools:
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - cv

volumes:
  frontend_node_modules:
  frontend_apps_next:
