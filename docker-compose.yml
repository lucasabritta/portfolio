services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NEXT_TELEMETRY_DISABLED: "1"

  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    profiles:
      - prod

  # Python tools: extract docx styles, download fonts, raster-compare PDFs (no Node).
  # Example: docker compose --profile cv run --rm cv-tools python scripts/download_cv_fonts.py
  # Example: docker compose --profile cv run --rm -v "C:/Users/Lucas/Downloads:/docs:ro" cv-tools \
  #   python scripts/extract_docx_cv_styles.py /docs/Lucas_Abritta_EM.docx
  cv-tools:
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - cv

volumes:
  web_node_modules:
