services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
      - "6006:6006"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      # Keep dev build output off the bind mount (avoids Turbopack/.next lock issues on Windows + Docker Desktop).
      - web_apps_web_next:/app/apps/web/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    profiles:
      - prod

  # Python tools: extract docx styles, download fonts, raster-compare PDFs (no Node).
  # Example: docker compose --profile cv run --rm cv-tools python scripts/download_cv_fonts.py
  # Example: docker compose --profile cv run --rm -v "C:/Users/Lucas/Downloads:/docs:ro" cv-tools \
  #   python scripts/extract_docx_cv_styles.py /docs/Lucas_Abritta_EM.docx
  cv-tools:
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - cv

volumes:
  web_node_modules:
  web_apps_web_next:
