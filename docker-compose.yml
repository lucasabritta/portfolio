services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
      - "6006:6006"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_apps_next:/app/apps/frontend/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    profiles:
      - prod

  cv-tools:
    image: python:3.12-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - cv

volumes:
  frontend_node_modules:
  frontend_apps_next:
