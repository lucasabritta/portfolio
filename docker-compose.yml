services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    working_dir: /workspace/apps/frontend
    ports:
      - "3000:3000"
      - "6006:6006"
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - e2e_node_modules:/workspace/apps/e2e/node_modules
      - frontend_apps_next:/workspace/apps/frontend/.next
      - storybook_node_modules:/workspace/packages/storybook/node_modules
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  frontend-prod:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    profiles:
      - prod

  cv-tools:
    image: python:3.12-slim-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
    profiles:
      - cv

volumes:
  e2e_node_modules:
  frontend_node_modules:
  frontend_apps_next:
  storybook_node_modules:
